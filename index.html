<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker - Vasanth</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1><i>Habit Discipline Tracker</i></h1>

<div class="controls">

<button onclick="prevMonth()">◀ Prev</button>

<select id="year"></select>

<select id="month">
<option value="0">Jan</option>
<option value="1">Feb</option>
<option value="2">Mar</option>
<option value="3">Apr</option>
<option value="4">May</option>
<option value="5">Jun</option>
<option value="6">Jul</option>
<option value="7">Aug</option>
<option value="8">Sep</option>
<option value="9">Oct</option>
<option value="10">Nov</option>
<option value="11">Dec</option>
</select>

<button onclick="nextMonth()">Next ▶</button>

<button onclick="goToday()">Today</button>

</div>


<div class="charts">

<div class="card">
<h3>Daily Progress</h3>
<canvas id="dailyChart"></canvas>
</div>

<div class="card">
<h3>Weekly Progress</h3>
<canvas id="weeklyChart"></canvas>
</div>

<div class="card">
<h3>Overall Stats</h3>
<canvas id="overallChart"></canvas>
</div>

</div>


<h2>Habits</h2>

<div class="tableWrap">

<table id="habitTable">

<thead>
<tr id="daysRow">
<th>Habit</th>
</tr>
</thead>

<tbody id="habitBody"></tbody>

</table>

</div>


<button class="saveBtn" onclick="saveData()">Save Progress</button>


<h2>Habit Streak</h2>

<div id="streakBox"></div>


<h2>Habit Success %</h2>

<table id="habitStats">

<thead>
<tr>
<th>Habit</th>
<th>Success %</th>
</tr>
</thead>

<tbody></tbody>

</table>


</div>

<script src="script.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBovv2JS2egaK-kvPTX3y_uBrYvsQ0cB4Q",
authDomain: "habit-tracker-f294b.firebaseapp.com",
databaseURL: "https://habit-tracker-f294b-default-rtdb.firebaseio.com",
projectId: "habit-tracker-f294b",
storageBucket: "habit-tracker-f294b.firebasestorage.app",
messagingSenderId: "1003014872273",
appId: "1:1003014872273:web:f2bbb8d8cc7a041c9d79f0",
measurementId: "G-DQGLEQ5ZKJ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// save habit
window.saveHabit = function(habit,day,status){

set(ref(db,"habits/"+habit+"/"+day),status)

}

// load habits
window.loadHabits = function(){

onValue(ref(db,"habits"),(snapshot)=>{

let data=snapshot.val()

if(!data) return

Object.keys(data).forEach(habit=>{

let days=data[habit]

Object.keys(days).forEach(day=>{

if(days[day]){

let habitIndex=habits.indexOf(habit)

let id=`h${habitIndex}d${day}`

let cb=document.getElementById(id)

if(cb) cb.checked=true

}

})

})

})

}

</script>
</body>
</html>
